version: "3.9"

services:
  app:
    build: .
    command: npm run dev
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  smee:
    image: node:22-alpine
    command:
      - sh
      - -c
      - npx smee-client --url ${SMEE_URL:-https://smee.io/new} --path /api/github/webhooks --port 3000
    depends_on:
      - app
